<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ruyaa Love</title>
<style>
html,body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff7eb3,#8e6cff);color:#fff}
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#ff7eb3,#8e6cff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;animation:hide .8s ease 2.5s forwards}
#splash .h{font-size:80px;animation:pulse 1s infinite}#splash h1{margin:8px 0}
@keyframes pulse{50%{transform:scale(1.1)}}@keyframes hide{to{opacity:0;visibility:hidden}}
header{text-align:center;padding:28px}.wrap{max-width:900px;margin:auto;padding:16px}.card{background:rgba(255,255,255,.15);padding:18px;border-radius:16px;margin:16px 0;backdrop-filter:blur(8px)}.post{background:#fff;color:#222;padding:10px;border-radius:10px;margin:8px 0}.post img{max-width:100%}button,input,textarea{padding:10px;border-radius:8px;border:none}input,textarea{width:100%;margin:6px 0}button{background:#ff2f72;color:#fff}#admin{display:none}#secret{position:fixed;right:14px;bottom:14px;font-size:28px;cursor:pointer}
</style>
<style id="cuteframe">
.photo-frame{
 display:inline-block;
 padding:10px;
 background:#fff;
 border:6px solid #ffd1e6;
 border-radius:24px;
 box-shadow:0 8px 20px rgba(0,0,0,.25);
 position:relative;
}
.photo-frame:before,.photo-frame:after{
 content:"❤️";
 position:absolute;
 top:-12px;
 font-size:20px;
}
.photo-frame:before{left:10px}
.photo-frame:after{right:10px}
.photo-frame img{
 display:block;
 max-width:100%;
 border-radius:16px;
 border:4px dashed #ff7eb3;
}
</style>
</head><body>
<div id=splash><div class=h>❤️</div><h1>RUYAA LOVE</h1><p>Selamat datang...</p></div>
<header><h1>❤️ Love Story ❤️</h1></header><div class=wrap>
<div class=card><h2>Untuk Kamu</h2><p>Terima kasih sudah hadir dalam hidupku ❤️</p></div>
<div class=card><h2>Posting</h2><div id=posts></div></div>
<div id=admin class=card><input id=t placeholder=Judul><textarea id=c placeholder="Isi"></textarea><input id=f type=file accept="image/*"><button onclick=savePost()>Posting</button></div></div>
<div id=secret>❤️</div>
<script>
const PASS="ruya";let tap=0,edit=-1;secret.onclick=()=>{if(++tap>=5){tap=0;if(prompt("Password")==PASS)admin.style.display="block";}};
const db=()=>JSON.parse(localStorage.loveDB||"[]"),set=v=>localStorage.loveDB=JSON.stringify(v);
function render(){posts.innerHTML="";db().slice().reverse().forEach((p,r)=>{let i=db().length-1-r;posts.innerHTML+=`<div class=post>${p.img?`<img src="${p.img}">`:""}<h3>${p.t}</h3><p>${p.c}</p><button onclick="like(${i})">❤️ ${p.l||0}</button> <button onclick="editP(${i})">Edit</button> <button onclick="del(${i})">Hapus</button></div>`})}
function like(i){let a=db();a[i].l=(a[i].l||0)+1;set(a);render()} function del(i){let a=db();a.splice(i,1);set(a);render()}
function editP(i){let a=db();edit=i;t.value=a[i].t;c.value=a[i].c}
function savePost(){let fr=new FileReader(),file=f.files[0];fr.onload=()=>done(fr.result);file?fr.readAsDataURL(file):done("")}
function done(img){let a=db(),o={t:t.value,c:c.value,img:img,l:0};if(edit>=0){o.l=a[edit].l;o.img=img||a[edit].img;a[edit]=o;edit=-1}else a.push(o);set(a);t.value=c.value="";f.value="";render()}
render();
</script>
<audio id="bgMusic" autoplay loop controls
style="position:fixed;left:12px;bottom:12px;z-index:9999">
  <source src="https://c.top4top.io/m_3838uijar9.mp3" type="audio/mpeg">
</audio>
<script>
window.addEventListener('load',()=>{
 const a=document.getElementById('bgMusic');
 if(a){
   a.volume=0.5;
   a.play().catch(()=>document.body.addEventListener('click',()=>a.play(),{once:true}));
 }
});
</script>


<div style="position:fixed;top:10px;right:10px;background:rgba(255,255,255,.2);padding:10px;border-radius:10px;z-index:9998">
❤️ Jadian: <b>07/02/2026</b><br>
<span id=" "></span>
</div>
<script>
(function(){
 const start=new Date('2026-07-02');
 function upd(){
  const d=Math.floor((new Date()-start)/86400000);
  const e=document.getElementById('loveDays');
  if(e)e.textContent='Bersama '+Math.max(0,d)+' hari';
 }
 upd();setInterval(upd,60000);
 setInterval(()=>{
   const s=document.createElement('div');
   s.textContent='❄️';
   s.style.position='fixed';
   s.style.left=Math.random()*100+'vw';
   s.style.top='-20px';
   s.style.zIndex='9997';
   s.style.fontSize=(12+Math.random()*16)+'px';
   s.style.transition='transform 7s linear, top 7s linear';
   document.body.appendChild(s);
   requestAnimationFrame(()=>{s.style.top='105vh';s.style.transform='translateX('+(Math.random()*100-50)+'px)';});
   setTimeout(()=>s.remove(),7000);
 },250);
})();
</script>


<script>
document.addEventListener('DOMContentLoaded',()=>{
 const obs=new MutationObserver(()=>{
   document.querySelectorAll('.post img').forEach(img=>{
     if(img.parentElement.classList.contains('photo-frame')) return;
     const w=document.createElement('div');
     w.className='photo-frame';
     img.parentNode.insertBefore(w,img);
     w.appendChild(img);
   });
 });
 obs.observe(document.body,{childList:true,subtree:true});
});
</script>
</body></html>
